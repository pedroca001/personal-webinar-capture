<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Última chance para entrar no grupo da aula Personal 10X." />
  <title>Última chance - Personal 10X</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070707;
      --panel: #101010;
      --line: rgba(255, 107, 24, 0.28);
      --text: #ffffff;
      --muted: #b5b5bd;
      --accent: #ff6b18;
      --cta: #19c47b;
      --cta-hover: #25d98d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 50% 100%, rgba(255, 107, 24, 0.14), transparent 45%),
        linear-gradient(180deg, #0b0b0b 0%, #050505 100%);
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      display: grid;
      min-height: 100vh;
      min-height: 100svh;
      place-items: center;
      padding: 24px 18px;
    }

    .card {
      width: min(100%, 460px);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(12, 12, 12, 0.88);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.5);
      padding: 26px 20px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.74rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-family: "Bebas Neue", Impact, sans-serif;
      font-size: clamp(3.8rem, 16vw, 6.8rem);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 0.88;
      text-transform: uppercase;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 750;
      line-height: 1.55;
    }

    .warning {
      color: #f6c0a4;
      font-size: 0.9rem;
      font-weight: 900;
    }

    .cta {
      display: flex;
      min-height: 58px;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 24px;
      border-radius: 10px;
      background: var(--cta);
      box-shadow: 0 18px 42px rgba(25, 196, 123, 0.24);
      color: #ffffff;
      font-size: 0.88rem;
      font-weight: 900;
      line-height: 1.2;
      text-align: center;
      text-transform: uppercase;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .cta:hover,
    .cta:focus-visible {
      background: var(--cta-hover);
      box-shadow: 0 22px 48px rgba(25, 196, 123, 0.34);
      outline: none;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="back-title">
      <p class="eyebrow">Oportunidade única</p>
      <h1 id="back-title">Não saia agora</h1>
      <p>Essa aula gratuita pode ser o ponto de virada para lotar sua agenda como personal.</p>
      <p class="warning">Se você não entrar no grupo agora, pode perder o link da aula e os avisos importantes.</p>
      <a class="cta" href="https://chat.whatsapp.com/JXlIpCdLdNE2Jiv1ktzWku" rel="noopener">Entrar no grupo do WhatsApp →</a>
    </section>
  </main>
</body>
</html>
